langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY}
      model-name: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
      log-requests: true
      log-responses: true

pdf:
  directory: ./pdf-documents
  chunk:
    size: 500
    overlap: 50

rag:
  max-results: 5
  min-score: 0.7

server:
  port: 8080

logging:
  level:
    com.banking: INFO