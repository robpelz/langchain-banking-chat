<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Banking PDF Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* Fragezeichen-Popup */
        .help-popup {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 280px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.02);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
        }
        .help-popup.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .help-btn {
            width: 44px;
            height: 44px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        .help-btn:hover {
            background: #f1f5f9;
            transform: scale(1.05);
        }
        @media (max-width: 640px) {
            .help-popup {
                width: 260px;
                right: 16px;
                bottom: 80px;
            }
            .help-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<!-- Fragezeichen-Popup -->
<div id="helpPopup" class="help-popup">
    <div class="p-4">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-bold text-slate-800">💡 Beispielfragen</h3>
            <button id="closePopupBtn" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
        </div>
        <p class="text-xs text-slate-500 mb-3">Klicke auf eine Frage zum Ausprobieren</p>
        <div class="space-y-2">
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                💰 Was waren meine höchsten Ausgaben im März?
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                📊 Welche Kategorie ist am teuersten?
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                💹 Wie hoch ist meine Sparquote?
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                📈 Vergleich Januar mit Februar
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                🛒 Wie viel habe ich für Lebensmittel ausgegeben?
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                🏠 Was sind meine monatlichen Fixkosten?
            </button>
            <button class="sample-question w-full text-left px-3 py-2 rounded-lg bg-slate-50 hover:bg-blue-50 transition-colors text-xs text-slate-700">
                📋 Zeige mir alle Buchungen
            </button>
        </div>
        <div class="mt-3 pt-2 border-t border-slate-100">
            <p class="text-xs text-slate-400 text-center">
                💡 Eigene Fragen? Einfach eingeben!
            </p>
        </div>
    </div>
</div>

<div class="container mx-auto px-4 py-4 max-w-4xl">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-xl md:text-2xl font-bold text-slate-800">🏦 PDF Banking Assistant</h1>
            <p class="text-xs text-slate-500">Analysiere Kontoauszüge mit KI</p>
        </div>
        <div class="text-right">
            <div class="text-xs text-slate-400">
                📊 <span id="transactionCount" th:text="${totalTransactions}">0</span> Buchungen
            </div>
        </div>
    </div>

    <!-- PDF Upload Bereich (kompakt) -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 mb-4">
        <div class="flex items-center justify-between flex-wrap gap-2">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                </div>
                <div>
                    <p class="text-xs font-medium text-slate-700">PDF hochladen</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="selectFileBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors">
                    📄 Datei
                </button>
                <button id="uploadBtn" class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium disabled:opacity-50" disabled>
                    Hochladen
                </button>
            </div>
        </div>
        <div id="uploadStatus" class="mt-2 text-xs text-slate-500 hidden">
            <span id="uploadFileName"></span>
            <div class="w-full bg-slate-100 rounded-full h-1 mt-1">
                <div id="uploadProgress" class="bg-blue-600 h-1 rounded-full transition-all" style="width: 0%"></div>
            </div>
        </div>
        <div id="pdfFileList" class="mt-2 flex flex-wrap gap-1"></div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chatMessages" class="bg-white rounded-xl shadow-sm border border-slate-200 h-[450px] overflow-y-auto p-3 mb-3">
        <div class="flex justify-start mb-3">
            <div class="bg-slate-100 rounded-xl rounded-tl-none px-3 py-2 max-w-[85%]">
                <p class="text-slate-700 text-sm">👋 Hallo! Klicke auf das <strong>❓</strong> rechts unten für Beispielfragen oder lade deine PDFs hoch.</p>
            </div>
        </div>
    </div>

    <!-- Input Area mit Fragezeichen-Button -->
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2">
        <div class="flex gap-2 items-center">
            <input type="text" id="questionInput"
                   class="flex-1 border-0 focus:ring-0 focus:outline-none p-2 text-slate-700 placeholder-slate-400 rounded-lg text-sm"
                   placeholder="Frage stellen...">
            <button id="sendButton"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium disabled:opacity-50">
                Senden
            </button>
            <div id="helpBtn" class="help-btn flex-shrink-0">
                <span class="text-slate-600 font-bold text-lg">?</span>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM Elements
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('questionInput');
    const sendButton = document.getElementById('sendButton');
    const uploadBtn = document.getElementById('uploadBtn');
    const selectFileBtn = document.getElementById('selectFileBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const uploadFileName = document.getElementById('uploadFileName');
    const uploadProgress = document.getElementById('uploadProgress');
    const pdfFileListDiv = document.getElementById('pdfFileList');

    // Popup Elements
    const helpPopup = document.getElementById('helpPopup');
    const helpBtn = document.getElementById('helpBtn');
    const closePopupBtn = document.getElementById('closePopupBtn');

    let selectedFiles = [];
    let uploadedFiles = [];

    // ============ HILFE POPUP ============
    function openPopup() {
        helpPopup.classList.add('open');
    }

    function closePopup() {
        helpPopup.classList.remove('open');
    }

    helpBtn.addEventListener('click', openPopup);
    closePopupBtn.addEventListener('click', closePopup);

    // Klick außerhalb schließt Popup
    document.addEventListener('click', (event) => {
        if (!helpPopup.contains(event.target) && !helpBtn.contains(event.target)) {
            closePopup();
        }
    });

    // Sample Questions - ins Textfeld übernehmen
    document.querySelectorAll('.sample-question').forEach(btn => {
        btn.addEventListener('click', () => {
            const question = btn.textContent.trim();
            questionInput.value = question;
            closePopup(); // Popup automatisch schließen
            questionInput.focus();
        });
    });

    // ============ CHAT FUNKTIONEN ============
    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });

    sendButton.addEventListener('click', sendMessage);

    async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage(question, 'user');
        questionInput.value = '';

        showTypingIndicator();
        sendButton.disabled = true;
        questionInput.disabled = true;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            hideTypingIndicator();
            addMessage(data.answer, 'assistant', data.sources);
        } catch (error) {
            hideTypingIndicator();
            addMessage('❌ Fehler: ' + error.message, 'assistant');
        } finally {
            sendButton.disabled = false;
            questionInput.disabled = false;
            questionInput.focus();
        }
    }

    function addMessage(content, role, sources = null) {
        const div = document.createElement('div');
        div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-3`;

        const bubbleClass = role === 'user'
            ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-xl rounded-tr-none'
            : 'bg-slate-100 text-slate-700 rounded-xl rounded-tl-none';

        let sourcesHtml = '';
        if (sources && sources.length > 0) {
            sourcesHtml = `<div class="text-xs text-slate-400 mt-1 pt-1 border-t border-slate-200">📎 Quellen: ${sources.join(', ')}</div>`;
        }

        div.innerHTML = `<div class="${bubbleClass} px-3 py-2 max-w-[85%]"><p class="text-sm whitespace-pre-wrap">${escapeHtml(content)}</p>${sourcesHtml}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'flex justify-start mb-3';
        div.innerHTML = `<div class="bg-slate-100 rounded-xl rounded-tl-none px-3 py-2"><div class="typing-indicator flex gap-1"><span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block"></span><span class="w-1.5 h-1.5 bg-slate-400 rounded-full inline-block"></span></div></div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ============ PDF UPLOAD FUNKTIONEN ============
    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.pdf';
    fileInput.multiple = true;
    fileInput.style.display = 'none';
    document.body.appendChild(fileInput);

    selectFileBtn.addEventListener('click', () => {
        fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
        selectedFiles = Array.from(e.target.files);
        updateFileList();
        uploadBtn.disabled = selectedFiles.length === 0;
        fileInput.value = '';
    });

    function updateFileList() {
        const container = document.getElementById('fileListPreview');
        if (!container && selectedFiles.length > 0) {
            const parent = document.querySelector('#uploadStatus').parentElement;
            let preview = document.getElementById('fileListPreview');
            if (!preview) {
                preview = document.createElement('div');
                preview.id = 'fileListPreview';
                preview.className = 'mt-2 flex flex-wrap gap-1';
                parent.appendChild(preview);
            }
        }

        const preview = document.getElementById('fileListPreview');
        if (preview) {
            if (selectedFiles.length === 0) {
                preview.innerHTML = '';
            } else {
                preview.innerHTML = selectedFiles.map(file => `
                    <div class="bg-blue-100 border border-blue-300 rounded-full px-2 py-0.5 text-xs text-blue-700 flex items-center gap-1">
                        <span>📄</span>
                        <span>${escapeHtml(file.name)}</span>
                        <button class="remove-file text-blue-600 hover:text-red-600" data-name="${escapeHtml(file.name)}">✕</button>
                    </div>
                `).join('');
            }
        }

        document.querySelectorAll('.remove-file').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const fileName = btn.getAttribute('data-name');
                selectedFiles = selectedFiles.filter(f => f.name !== fileName);
                updateFileList();
                uploadBtn.disabled = selectedFiles.length === 0;
            });
        });
    }

    function addToPdfFileList(filename) {
        if (!uploadedFiles.includes(filename)) {
            uploadedFiles.push(filename);
        }

        if (uploadedFiles.length === 0) {
            pdfFileListDiv.innerHTML = '';
        } else {
            pdfFileListDiv.innerHTML = uploadedFiles.map(file => `
                <div class="bg-green-100 border border-green-300 rounded-full px-2 py-0.5 text-xs text-green-700 inline-block">
                    📄 ${escapeHtml(file)}
                </div>
            `).join('');
        }
    }

    uploadBtn.addEventListener('click', async () => {
        if (selectedFiles.length === 0) return;

        uploadStatus.classList.remove('hidden');
        uploadBtn.disabled = true;
        selectFileBtn.disabled = true;

        let successCount = 0;
        let failCount = 0;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            uploadFileName.textContent = `${file.name} (${i+1}/${selectedFiles.length})`;
            uploadProgress.style.width = `${((i) / selectedFiles.length) * 100}%`;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    successCount++;
                    addToPdfFileList(file.name);
                } else {
                    failCount++;
                }
            } catch (error) {
                failCount++;
            }
        }

        uploadProgress.style.width = '100%';
        uploadFileName.textContent = `✅ ${successCount} ok, ${failCount} fehlgeschlagen.`;

        setTimeout(() => {
            uploadStatus.classList.add('hidden');
            uploadProgress.style.width = '0%';
            selectedFiles = [];
            updateFileList();
            uploadBtn.disabled = true;
            selectFileBtn.disabled = false;
            const preview = document.getElementById('fileListPreview');
            if (preview) preview.innerHTML = '';
        }, 2000);
    });

    async function loadExistingFiles() {
        try {
            const response = await fetch('/api/files');
            const files = await response.json();
            if (files && files.length > 0) {
                uploadedFiles = files;
                pdfFileListDiv.innerHTML = files.map(file => `
                    <div class="bg-green-100 border border-green-300 rounded-full px-2 py-0.5 text-xs text-green-700 inline-block">
                        📄 ${escapeHtml(file)}
                    </div>
                `).join('');
            }
        } catch (error) {
            console.error('Fehler:', error);
        }
    }

    loadExistingFiles();
</script>
</body>
