<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking PDF Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

<div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- Header -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl shadow-lg mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-slate-800">Banking PDF Assistant</h1>
        <p class="text-slate-500 mt-2">Frage deine Kontoauszüge mit KI</p>
        <div class="mt-2 text-sm text-slate-400">
            📄 <span th:text="${chunkCount}">0</span> Textsegmente geladen
        </div>
    </div>

    <!-- Chat Messages Area -->
    <div id="chatMessages" class="bg-white rounded-2xl shadow-sm border border-slate-200 h-[500px] overflow-y-auto p-4 mb-4">
        <div class="flex justify-start mb-4">
            <div class="bg-slate-100 rounded-2xl rounded-tl-none px-4 py-2 max-w-[80%]">
                <p class="text-slate-700 text-sm">👋 Hallo! Ich habe deine Kontoauszüge analysiert. Was möchtest du wissen?</p>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-2">
        <div class="flex gap-2">
                <textarea id="questionInput" rows="1"
                          class="flex-1 resize-none border-0 focus:ring-0 focus:outline-none p-3 text-slate-700 placeholder-slate-400"
                          placeholder="Frage stellen, z.B. 'Wie hoch war die Miete im Januar?' ..."></textarea>
            <button id="sendButton"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-2 rounded-xl font-medium hover:from-blue-700 hover:to-indigo-700 transition-all disabled:opacity-50">
                Senden
            </button>
        </div>
        <div class="text-xs text-slate-400 px-3 pb-2">
            💡 Tipp: Frage nach Buchungen, Beträgen oder Zeiträumen
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const questionInput = document.getElementById('questionInput');
    const sendButton = document.getElementById('sendButton');

    questionInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    questionInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendButton.addEventListener('click', sendMessage);

    async function sendMessage() {
        const question = questionInput.value.trim();
        if (!question) return;

        addMessage(question, 'user');
        questionInput.value = '';
        questionInput.style.height = 'auto';

        showTypingIndicator();
        sendButton.disabled = true;
        questionInput.disabled = true;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            hideTypingIndicator();
            addMessage(data.answer, 'assistant', data.sources);
        } catch (error) {
            hideTypingIndicator();
            addMessage('❌ Fehler: ' + error.message, 'assistant');
        } finally {
            sendButton.disabled = false;
            questionInput.disabled = false;
            questionInput.focus();
        }
    }

    function addMessage(content, role, sources = null) {
        const div = document.createElement('div');
        div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4`;

        const bubbleClass = role === 'user'
            ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-2xl rounded-tr-none'
            : 'bg-slate-100 text-slate-700 rounded-2xl rounded-tl-none';

        let sourcesHtml = '';
        if (sources && sources.length > 0) {
            sourcesHtml = `<div class="text-xs text-slate-400 mt-2 pt-2 border-t border-slate-200">📎 Quellen: ${sources.join(', ')}</div>`;
        }

        div.innerHTML = `<div class="${bubbleClass} px-4 py-2 max-w-[80%] shadow-sm"><p class="text-sm whitespace-pre-wrap">${escapeHtml(content)}</p>${sourcesHtml}</div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTypingIndicator() {
        const div = document.createElement('div');
        div.id = 'typingIndicator';
        div.className = 'flex justify-start mb-4';
        div.innerHTML = `<div class="bg-slate-100 rounded-2xl rounded-tl-none px-4 py-3"><div class="typing-indicator flex gap-1"><span class="w-2 h-2 bg-slate-400 rounded-full inline-block"></span><span class="w-2 h-2 bg-slate-400 rounded-full inline-block"></span><span class="w-2 h-2 bg-slate-400 rounded-full inline-block"></span></div></div>`;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function hideTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>
</body>
</html>
